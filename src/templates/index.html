<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex — AI Investment Research</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
        .header { padding: 24px 40px; border-bottom: 1px solid #1a1a1a; }
        .header h1 { font-size: 24px; font-weight: 700; color: #fff; }
        .header span { color: #666; font-size: 14px; margin-left: 12px; }
        .main { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .search-box { display: flex; gap: 12px; margin-bottom: 32px; }
        .search-box input {
            flex: 1; padding: 14px 20px; background: #141414; border: 1px solid #2a2a2a;
            border-radius: 8px; color: #fff; font-size: 16px; outline: none;
        }
        .search-box input:focus { border-color: #4a9eff; }
        .search-box button {
            padding: 14px 32px; background: #4a9eff; color: #fff; border: none;
            border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .search-box button:hover { background: #3a8eef; }
        .search-box button:disabled { background: #333; cursor: not-allowed; }
        .companies { display: flex; gap: 8px; margin-bottom: 32px; }
        .companies button {
            padding: 8px 16px; background: #1a1a1a; border: 1px solid #2a2a2a;
            border-radius: 6px; color: #aaa; font-size: 13px; cursor: pointer;
        }
        .companies button:hover { border-color: #4a9eff; color: #fff; }
        .status { padding: 16px 20px; background: #0d1117; border: 1px solid #1a2332; border-radius: 8px; margin-bottom: 20px; display: none; }
        .status .step { color: #666; font-size: 13px; margin-bottom: 4px; }
        .status .step.active { color: #4a9eff; }
        .status .step.done { color: #3fb950; }
        .status .step.done::before { content: "✓ "; }
        .status .step.active::before { content: "● "; }
        .status .step.pending::before { content: "○ "; color: #333; }
        .error { padding: 16px; background: #1a0a0a; border: 1px solid #4a1a1a; border-radius: 8px; color: #f85149; margin-bottom: 20px; display: none; }
        .tabs { display: flex; gap: 0; border-bottom: 1px solid #2a2a2a; margin-bottom: 24px; }
        .tabs button {
            padding: 12px 24px; background: none; border: none; border-bottom: 2px solid transparent;
            color: #666; font-size: 14px; cursor: pointer;
        }
        .tabs button.active { color: #fff; border-bottom-color: #4a9eff; }
        .tabs button:hover { color: #ccc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .result { display: none; }
        .result.visible { display: block; }
        .memo-content {
            background: #111; border: 1px solid #1a1a1a; border-radius: 8px; padding: 32px;
            line-height: 1.7; font-size: 15px;
        }
        .memo-content h1 { font-size: 22px; margin-bottom: 8px; color: #fff; }
        .memo-content h2 { font-size: 17px; margin-top: 24px; margin-bottom: 12px; color: #4a9eff; border-bottom: 1px solid #1a1a1a; padding-bottom: 6px; }
        .memo-content h3 { font-size: 15px; margin-top: 16px; margin-bottom: 8px; color: #ccc; }
        .memo-content p { margin-bottom: 10px; }
        .memo-content ul, .memo-content ol { margin-left: 20px; margin-bottom: 12px; }
        .memo-content li { margin-bottom: 6px; }
        .memo-content strong { color: #fff; }
        .memo-content blockquote { border-left: 3px solid #4a9eff; padding-left: 16px; color: #999; margin: 12px 0; }
        .memo-content table { width: 100%; border-collapse: collapse; margin: 12px 0; }
        .memo-content th, .memo-content td { padding: 8px 12px; border: 1px solid #2a2a2a; text-align: left; font-size: 13px; }
        .memo-content th { background: #1a1a1a; color: #aaa; }
        .memo-content hr { border: none; border-top: 1px solid #2a2a2a; margin: 20px 0; }
        .meta { font-size: 13px; color: #666; margin-top: 16px; }
        .download { display: inline-block; margin-top: 12px; padding: 8px 16px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; color: #4a9eff; text-decoration: none; font-size: 13px; }
        .download:hover { border-color: #4a9eff; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #333; border-top-color: #4a9eff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>Cortex<span>AI Investment Research</span></h1>
    </div>
    <div class="main">
        <div class="search-box">
            <input type="text" id="company-input" placeholder="Enter company name — e.g. Nvidia, Tesla, Amazon" autofocus>
            <button id="analyze-btn" onclick="analyze()">Analyze</button>
        </div>
        <div class="companies">
            {% for name in companies %}
            <button onclick="quickSelect('{{ name }}')">{{ name }}</button>
            {% endfor %}
        </div>

        <div class="status" id="status-box">
            <div class="step" id="step-1">Loading company data</div>
            <div class="step" id="step-2">Running Earnings Analyzer Agent</div>
            <div class="step" id="step-3">Running Sentiment/Narrative Agent</div>
            <div class="step" id="step-4">Generating IC Memo</div>
        </div>

        <div class="error" id="error-box"></div>

        <div class="result" id="result-box">
            <div class="tabs">
                <button class="active" onclick="showTab('memo')">IC Memo</button>
                <button onclick="showTab('earnings')">Earnings Analysis</button>
                <button onclick="showTab('sentiment')">Sentiment & Narratives</button>
            </div>
            <div class="tab-content active" id="tab-memo">
                <div class="memo-content" id="memo-content"></div>
                <div class="meta" id="memo-meta"></div>
                <a class="download" id="download-link" href="#" download>Download Memo (.md)</a>
            </div>
            <div class="tab-content" id="tab-earnings">
                <div class="memo-content" id="earnings-content"></div>
            </div>
            <div class="tab-content" id="tab-sentiment">
                <div class="memo-content" id="sentiment-content"></div>
            </div>
        </div>
    </div>

    <script>
        // Minimal markdown to HTML (covers headers, bold, lists, tables, blockquotes, hr)
        function md(text) {
            let html = text
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
                .replace(/^---$/gm, '<hr>')
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');

            // Wrap consecutive <li> in <ul>
            html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

            // Tables
            html = html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)+)/gm, function(match, header, sep, body) {
                const ths = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
                const rows = body.trim().split('\n').map(row => {
                    const tds = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
                    return `<tr>${tds}</tr>`;
                }).join('');
                return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
            });

            // Paragraphs
            html = html.split('\n\n').map(block => {
                if (block.startsWith('<')) return block;
                return block.replace(/\n/g, '<br>');
            }).join('\n');

            return html;
        }

        function quickSelect(name) {
            document.getElementById('company-input').value = name;
            analyze();
        }

        function showTab(name) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
            event.target.classList.add('active');
        }

        function setStep(n, state) {
            for (let i = 1; i <= 4; i++) {
                const el = document.getElementById('step-' + i);
                if (i < n) el.className = 'step done';
                else if (i === n) el.className = 'step ' + state;
                else el.className = 'step pending';
            }
        }

        async function analyze() {
            const input = document.getElementById('company-input');
            const company = input.value.trim();
            if (!company) return;

            const btn = document.getElementById('analyze-btn');
            const statusBox = document.getElementById('status-box');
            const errorBox = document.getElementById('error-box');
            const resultBox = document.getElementById('result-box');

            btn.disabled = true;
            btn.textContent = 'Analyzing...';
            statusBox.style.display = 'block';
            errorBox.style.display = 'none';
            resultBox.classList.remove('visible');
            setStep(1, 'active');

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ company })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Analysis failed');
                }

                setStep(4, 'done');

                document.getElementById('memo-content').innerHTML = md(data.memo);
                document.getElementById('earnings-content').innerHTML = md(data.earnings_analysis);
                document.getElementById('sentiment-content').innerHTML = md(data.sentiment_analysis);
                document.getElementById('memo-meta').textContent =
                    `${data.company} (${data.ticker}) | ${data.quarter} vs ${data.previous_quarter} | ${data.elapsed_seconds}s | Saved: ${data.memo_file}`;

                const blob = new Blob([data.memo], { type: 'text/markdown' });
                const url = URL.createObjectURL(blob);
                const dl = document.getElementById('download-link');
                dl.href = url;
                dl.download = `${data.ticker}_memo.md`;

                resultBox.classList.add('visible');
                // Show memo tab by default
                document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
                document.getElementById('tab-memo').classList.add('active');
                document.querySelector('.tabs button').classList.add('active');

            } catch (err) {
                errorBox.textContent = err.message;
                errorBox.style.display = 'block';
                statusBox.style.display = 'none';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Analyze';
            }
        }

        // Enter key to submit
        document.getElementById('company-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') analyze();
        });

        // SSE for live pipeline status
        const evtSource = new EventSource('/api/status');
        evtSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            if (data.step && data.state) {
                setStep(data.step, data.state);
            }
        };
    </script>
</body>
</html>
