<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex — Sign In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: #f8f9fb; color: #1a1d23; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-container {
            width: 100%; max-width: 400px; padding: 0 20px;
        }
        .login-card {
            background: #fff; border: 1px solid #e2e5ea; border-radius: 12px;
            padding: 40px 36px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .logo {
            display: flex; align-items: center; gap: 10px; margin-bottom: 8px; justify-content: center;
        }
        .logo-icon {
            width: 36px; height: 36px; background: #2563eb; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 16px; color: #fff;
        }
        .logo-text { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
        .logo-sub {
            text-align: center; font-size: 11px; color: #9ca3af; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 32px;
        }
        .form-group { margin-bottom: 18px; }
        .form-label {
            display: block; font-size: 13px; font-weight: 600; color: #4b5563;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%; padding: 11px 14px; background: #f8f9fb; border: 1px solid #e2e5ea;
            border-radius: 8px; font-size: 14px; color: #1a1d23; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus {
            border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .form-input::placeholder { color: #9ca3af; }
        .login-btn {
            width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none;
            border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s; margin-top: 6px;
        }
        .login-btn:hover {
            background: #1d4ed8; box-shadow: 0 4px 12px rgba(37,99,235,0.3);
        }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
        .error-msg {
            display: none; padding: 10px 14px; background: #fef2f2; border: 1px solid #fecaca;
            border-radius: 6px; color: #dc2626; font-size: 13px; margin-bottom: 16px; text-align: center;
        }
        .error-msg.visible { display: block; }
        .footer {
            text-align: center; margin-top: 24px; font-size: 12px; color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">C</div>
                <div class="logo-text">Cortex</div>
            </div>
            <div class="logo-sub">AI Investment Research Platform</div>

            <div class="error-msg" id="error-msg"></div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-input" id="email" type="email" placeholder="Enter your email" autocomplete="email" autofocus required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" id="password" type="password" placeholder="Enter your password" autocomplete="current-password" required>
                </div>
                <button class="login-btn" type="submit" id="login-btn">Sign In</button>
            </form>
        </div>
        <div class="footer">Cortex &mdash; Powered by AI</div>
    </div>

    <script>
    async function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');
        const errEl = document.getElementById('error-msg');

        btn.disabled = true;
        btn.textContent = 'Signing in...';
        errEl.classList.remove('visible');

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (res.ok) {
                window.location.href = '/';
            } else {
                const data = await res.json();
                errEl.textContent = data.detail || 'Login failed';
                errEl.classList.add('visible');
            }
        } catch (err) {
            errEl.textContent = 'Connection error. Please try again.';
            errEl.classList.add('visible');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    }
    </script>
</body>
</html>
